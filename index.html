<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
	    <link rel="stylesheet" href="style.css">
	    <title>Blobert Game</title>
    </head>
    <body>
        <div class="container">
            <div class="inner-wrapper">
                <div class="nav-bar">
                    <div class="navigation">
                        <img src="/imgs/xicon.svg" class="" alt="x">
                        <h3 class="nav-text">Blobert Game</h3>
                    </div>
                </div>
                <div class="main-game-wrapper">
                    <div class="counter-wrapper">
                        <div class="counter">
                            <img src="/imgs/blobe-coin.png" class="blobe-coin" alt="o">
                            <h1 class="amount" id="amount">0</h1>
                        </div>
                        <p class="league">Silver League</p>
                    </div>
                    <div class="blob-wrapper">
                        <img src="/imgs/bubble.png" id="bubble" class="" alt="O">
                    </div>
                </div>
                <div class="stamina-bar-wrapper">
                    <div class="energy-wrapper">
                        <p class="energy">Energy:</p>
                        <p class="energy-amount" id="energy-amount">250</p>
                    </div>
                    <div class="stamina-bar">
                        <img src="/imgs/stamina-bar.png" class="" alt="-----------">
                    </div>
                </div>
            </div>
        </div>

        <script src="https://telegram.org/js/telegram-web-app.js"></script>
	    <script src="app.js"></script>
    </body>
</html>
