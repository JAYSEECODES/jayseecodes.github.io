<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
	    <link rel="stylesheet" href="style.css">
	    <title>Blobert Game</title>
    </head>
    <body>
        <div class="container" id="container">
            <div class="nav-bar">
                <div class="navigation">
                    <img src="/imgs/sign.png" class="" alt="x">
                </div>
            </div>
            <div class="inner-wrapper">
                <div class="main-game-wrapper">
                    <div class="counter-wrapper" id="counter-wrapper">
                        <div class="counter">
                            <img src="/imgs/blobe-coin.png" class="blobe-coin" alt="o">
                            <h1 class="amount" id="amount">0</h1>
                        </div>
                        <div class="league-wrapper">
                            <p class="league">designer.stark</p>
                        </div>
                    </div>
                    <div class="blob-wrapper">
                        <img src="/imgs/bubble.png" id="bubble" class="bubble" alt="O">
                    </div>
                </div>
                <div class="stamina-bar-wrapper" id="stamina-wrapper">
                    <div class="energy-wrapper">
                        <img src="imgs/energy-ico.png" class="energy-ico" alt="⚡">
                        <p class="energy-amount" id="energy-amount">100</p>
                        <div class="progress">
                            <div class="bar"></div>
                          </div>
                    </div>
                </div>
            </div>
            <div class="bottom-frame">
                <img src="/imgs/frame-bottom.png" class="" alt="">
            </div>
            
        </div>

        <script src="https://telegram.org/js/telegram-web-app.js"></script>
	    <script src="app.js"></script>
    </body>
</html>
